# IMC KMS — Apache 2.4 reverse-proxy for AWS Bare-Metal EC2 (sub-path deploy).
#
# KMS runs under the /kms SUB-PATH of a SHARED host
# (https://appstpcid.imcpelilog.co.id/kms) alongside co-tenant apps. The Node
# server is built with URL=https://appstpcid.imcpelilog.co.id/kms, so it derives
# BASE_PATH=/kms (server/env.ts) and applies the /kms prefix ITSELF — Apache
# just forwards the prefix unchanged.
#
# This is the KMS counterpart to imc-clocka's deploy/apache/clocka.conf and
# follows the same rules. The one structural difference: KMS needs real
# WebSocket proxying for live collaboration/presence (clocka does not).
#
# CRITICAL — forward the /kms prefix UNCHANGED:
#   ProxyPass        /kms http://127.0.0.1:3100/kms
#   ProxyPassReverse /kms http://127.0.0.1:3100/kms
# Both sides carry /kms (NO trailing slash on either side — a trailing slash
# rewrites the request URI and breaks path matching at the Koa mount). The
# shared-domain edge in front of this Apache must likewise forward the whole
# /kms/* prefix (incl. /kms/static/*, /kms/api/*, /kms/realtime, /kms/collaboration,
# /kms/static/sw.js) without stripping it.
#
# Required modules (enable once, then restart):
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl headers deflate
#   sudo systemctl restart apache2
#
# SHARED-HOST DEPLOY: if appstpcid.imcpelilog.co.id is already served by an
# existing <VirtualHost *:443> (co-tenant apps at other paths), do NOT add the
# whole file — paste only the directives BETWEEN the "BEGIN/END kms proxy block"
# markers into that existing <VirtualHost>. The <VirtualHost> wrappers here are
# for a dedicated host.
#
# Drop at /etc/apache2/sites-available/kms.conf, then:
#   sudo a2ensite kms && sudo apachectl configtest && sudo systemctl reload apache2
# See docs/DEPLOYMENT-GUIDE.md for the full walkthrough.
#
# Assumes the KMS process (deploy/systemd/kms.service or PM2) binds to
# 127.0.0.1:3100 on the same host. Change the proxy target below to the PORT in
# /opt/kms/.env if different. SSL directives are commented so this file passes
# `apachectl configtest` on a clean machine; paste real cert paths (or run
# `certbot --apache`) before reloading.

# Redirect plaintext HTTP to HTTPS (scoped to /kms so co-tenant redirects are
# left untouched).
<VirtualHost *:80>
    ServerName appstpcid.imcpelilog.co.id
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/kms(/.*)?$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName appstpcid.imcpelilog.co.id

    # --- SSL (uncomment + paste paths after acquiring certs) ---
    # SSLEngine on
    # SSLCertificateFile      /etc/ssl/kms/fullchain.pem
    # SSLCertificateKeyFile   /etc/ssl/kms/privkey.pem
    # SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1

    # ===================== BEGIN kms proxy block =====================
    # (Paste everything from here to "END kms proxy block" into an existing
    #  <VirtualHost *:443> when sharing the host with co-tenant apps.)

    # HSTS: enforce HTTPS for 2 years incl. subdomains. `always` applies even on
    # proxied non-2xx responses. Requires mod_headers.
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    ProxyRequests Off
    # Preserve the public Host so the PWA service worker registers at the public
    # origin with scope /kms/ (NOT the loopback host), and so request logs show
    # the real host.
    ProxyPreserveHost On
    # TLS is terminated here; tell the app the original scheme.
    RequestHeader set X-Forwarded-Proto "https"

    # Attachment uploads can be large (KMS allows up to 100MB by default).
    LimitRequestBody 104857600

    # 24h timeout so long-lived WebSocket connections are not reaped.
    ProxyTimeout 86400

    # gzip text-y bodies (mod_deflate). Hashed static assets under
    # /kms/static/ are immutable and already long-cached by the app.
    AddOutputFilterByType DEFLATE text/plain text/css text/javascript \
        application/javascript application/json application/xml image/svg+xml

    # Bare /kms (no trailing slash) -> /kms/ so the app shell, SW scope (/kms/)
    # and manifest start_url (/kms/) all line up. Exact-match only, so it never
    # shadows the /kms proxy below.
    RedirectMatch 308 "^/kms$" "/kms/"

    # The service worker must NOT be long-cached by the proxy/edge or stale
    # builds keep serving precached HTML with mismatched build hashes. KMS
    # serves it at /kms/static/sw.js (app/index.tsx). `always` applies to
    # proxied responses too.
    <Location "/kms/static/sw.js">
        Header always set Cache-Control "no-cache, no-store, must-revalidate"
    </Location>

    # ------------------------------------------------------------------------
    # WebSocket support (REQUIRED for real-time collaboration & presence).
    # Scoped to /kms/ — a host-wide rule would hijack co-tenant apps' upgrades.
    # The destination preserves the /kms/ prefix so it matches the app's
    # `${BASE_PATH}/realtime` and `${BASE_PATH}/collaboration/<docId>` handlers.
    # Must come BEFORE the ProxyPass below.
    # ------------------------------------------------------------------------
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /kms/(.*) ws://127.0.0.1:3100/kms/$1 [P,L]

    # ------------------------------------------------------------------------
    # Reverse proxy to the Node app. NO trailing slash on either side — the
    # /kms prefix must reach the Koa mount unchanged. Change 127.0.0.1:3100 to
    # the PORT in /opt/kms/.env if different.
    # ------------------------------------------------------------------------
    ProxyPass        /kms http://127.0.0.1:3100/kms
    ProxyPassReverse /kms http://127.0.0.1:3100/kms

    # --- Optional: quieter health-probe logging ---
    # The liveness probe is at the ORIGIN ROOT /_health (NOT under /kms — it is
    # registered before the BASE_PATH mount). If an external load balancer hits
    # it, proxy it explicitly and drop it from the access log:
    # ProxyPass        /_health http://127.0.0.1:3100/_health
    # ProxyPassReverse /_health http://127.0.0.1:3100/_health
    # SetEnvIf Request_URI "^/_health" dontlog
    # CustomLog ${APACHE_LOG_DIR}/kms-access.log combined env=!dontlog

    # ====================== END kms proxy block ======================
</VirtualHost>

# ============================================================================
# ALTERNATIVE: Dedicated-subdomain layout (URL=https://kms.imcpelilog.co.id)
# ============================================================================
# Use when KMS owns its own hostname. Set URL=https://kms.imcpelilog.co.id in
# .env (BASE_PATH becomes ""), rebuild, then the rewrite/proxy rules can be
# host-wide (replace "/kms/" with "/" and drop the bare-path redirect). See
# docs/apache-vhost.conf for that variant.
