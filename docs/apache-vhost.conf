# Apache Virtual Host Configuration for KMS (Outline Wiki)
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl
#   sudo systemctl restart apache2
#
# Place this file in /etc/apache2/sites-available/ and enable with:
#   sudo a2ensite kms.conf
#   sudo systemctl reload apache2
#
# ----------------------------------------------------------------------------
# Two deployment layouts are supported. Pick ONE:
#
#   1. Shared subdomain with a sub-path (PRIMARY, see below).
#      KMS is served at https://appstpcid.imcpelilog.co.id/kms alongside other
#      apps on the same hostname (e.g. inventory journal plog, pgl).
#      Set URL=https://appstpcid.imcpelilog.co.id/kms in .env, and rebuild Vite.
#
#   2. Dedicated subdomain (ALTERNATIVE, see end of file).
#      KMS owns its own hostname, e.g. https://kms.imcpelilog.co.id.
#      Set URL=https://kms.imcpelilog.co.id in .env, and rebuild Vite.
#
# In both cases, the value of URL must match between `yarn vite:build` (build
# time) and `yarn start` (runtime). Drift produces 404s for hashed bundles.
# ----------------------------------------------------------------------------

# ============================================================================
# PRIMARY: Shared-subdomain layout (URL=https://appstpcid.imcpelilog.co.id/kms)
# ============================================================================
#
# This layout coexists with co-tenant apps on the same hostname. The proxy
# rules are SCOPED to /kms/ specifically so that WebSocket upgrades and HTTP
# requests destined for other apps are not intercepted.

<VirtualHost *:80>
    ServerName appstpcid.imcpelilog.co.id

    # Redirect HTTP → HTTPS only for /kms (preserve other apps' redirects).
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/kms(/.*)?$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName appstpcid.imcpelilog.co.id

    SSLEngine on
    SSLCertificateFile    /path/to/cert.pem
    SSLCertificateKeyFile /path/to/key.pem

    ProxyPreserveHost On

    # ------------------------------------------------------------------------
    # WebSocket support (required for real-time collaboration & presence).
    #
    # IMPORTANT: this rewrite rule MUST be scoped to /kms/ — not host-wide.
    # A host-wide rule like `RewriteRule /(.*) ws://127.0.0.1:3100/$1` would
    # intercept WebSocket upgrades for every co-tenant app on this hostname
    # (inventory journal plog, pgl, …) and route them all to KMS's port,
    # breaking their real-time features. Do NOT remove the /kms/ scope.
    #
    # The destination preserves the /kms/ prefix so the forwarded URL matches
    # KMS's internal mount + WebSocket upgrade-handler paths
    # (`${BASE_PATH}/realtime`, `${BASE_PATH}/collaboration/<docId>`).
    # ------------------------------------------------------------------------
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /kms/(.*) ws://127.0.0.1:3100/kms/$1 [P,L]

    # ------------------------------------------------------------------------
    # Reverse proxy to Node.js app.
    #
    # IMPORTANT: do NOT add a trailing slash to either side of ProxyPass /
    # ProxyPassReverse. `ProxyPass /kms/ http://127.0.0.1:3100/kms/` (with
    # trailing slashes) rewrites the request URI in a way that breaks path
    # matching at the Koa mount. Keep both sides without a trailing slash so
    # the /kms prefix is preserved through the proxy hop.
    # ------------------------------------------------------------------------
    ProxyPass /kms http://127.0.0.1:3100/kms
    ProxyPassReverse /kms http://127.0.0.1:3100/kms

    # File upload size limit (100MB)
    LimitRequestBody 104857600

    # Proxy timeouts (24h for long-lived WebSocket connections)
    ProxyTimeout 86400
</VirtualHost>

# ============================================================================
# ALTERNATIVE: Dedicated-subdomain layout (URL=https://kms.imcpelilog.co.id)
# ============================================================================
#
# Use this layout when KMS owns its own hostname and no other apps share the
# vhost. The rewrite/proxy rules can then be host-wide (no /kms/ scoping).
# Set URL=https://kms.imcpelilog.co.id in .env, rebuild Vite, and uncomment
# the block below.
#
# <VirtualHost *:80>
#     ServerName kms.imcpelilog.co.id
#
#     # Redirect all HTTP to HTTPS
#     RewriteEngine On
#     RewriteCond %{HTTPS} off
#     RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
# </VirtualHost>
#
# <VirtualHost *:443>
#     ServerName kms.imcpelilog.co.id
#
#     SSLEngine on
#     SSLCertificateFile    /path/to/cert.pem
#     SSLCertificateKeyFile /path/to/key.pem
#
#     ProxyPreserveHost On
#
#     # WebSocket support (required for real-time collaboration)
#     RewriteEngine On
#     RewriteCond %{HTTP:Upgrade} =websocket [NC]
#     RewriteRule /(.*) ws://127.0.0.1:3100/$1 [P,L]
#
#     # Reverse proxy to Node.js app
#     ProxyPass / http://127.0.0.1:3100/
#     ProxyPassReverse / http://127.0.0.1:3100/
#
#     # File upload size limit (100MB)
#     LimitRequestBody 104857600
#
#     # Proxy timeouts (24h for long-lived WebSocket connections)
#     ProxyTimeout 86400
# </VirtualHost>
